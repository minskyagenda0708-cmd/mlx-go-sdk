linters:
  enable:
    - gofmt
    - govet
    - staticcheck
    - errcheck
    - gosec
    - revive
    - unused
    - ineffassign

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
  gosec:
    excludes:
      - G104

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
